<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Control Live</title>
    <style>
        :root {
            --color-verde: #28a745; --color-rojo: #dc3545; --accent: #007bff;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; color: white; 
        }
        
        #bg-image { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070&auto=format&fit=crop'); /* Imagen de respaldo por si no tienes la local */
            background-size: cover; background-position: center; z-index: 1;
        }
        
        #dynamic-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; transition: 0.5s; pointer-events: none; }
        .overlay-pista { background: rgba(40, 167, 69, 0.75) !important; }
        .overlay-final { background: rgba(220, 53, 69, 0.8) !important; }

        /* RELOJ ADAPTATIVO */
        .weather-clock-widget { 
            position: absolute; top: 10px; right: 10px; text-align: right; z-index: 1000; 
            background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(8px);
        }
        #local-date { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        #local-time { font-size: 1.8rem; font-weight: 900; line-height: 1; }

        /* SIDEBAR / MENÚ */
        .sidebar { 
            position: absolute; top: 10px; left: 10px; width: 200px; z-index: 100; 
            transition: 0.3s opacity;
        }
        .btn-sel { 
            width: 100%; padding: 8px; margin-bottom: 4px; background: rgba(0,0,0,0.8); 
            color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; 
            font-size: 0.75rem; cursor: pointer; text-align: left;
        }
        .btn-sel.active { background: var(--accent); border-color: #fff; }

        /* DISPLAY PRINCIPAL - RESPONSIVE */
        .display-main { 
            position: relative; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; text-align: center; 
            pointer-events: none; padding: 0 10px;
        }
        #actividad-nombre { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 900; text-shadow: 2px 2px 10px #000; margin-bottom: 5px; }
        #status { font-size: clamp(2rem, 8vw, 5rem); letter-spacing: 5px; font-weight: 900; text-shadow: 2px 2px 10px #000; }
        #timer { font-size: clamp(4rem, 20vw, 18rem); font-weight: 900; line-height: 0.8; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* BOTÓN +5 */
        #btn-plus { 
            pointer-events: auto; margin-top: 20px; padding: 15px 30px; background: #ffc107; color: #000; 
            border: none; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; display: none;
        }

        /* PANEL CONFIG COMPACTO PARA MOBILE */
        #config-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #111; 
            padding: 10px; border-top: 3px solid var(--accent); z-index: 2000; transition: 0.4s;
        }
        #config-panel.minimized { transform: translateY(calc(100% - 35px)); }
        .toggle-panel { 
            position: absolute; top: -30px; right: 10px; background: var(--accent); 
            color: white; border: none; padding: 5px 15px; border-radius: 8px 8px 0 0; font-size: 0.7rem;
        }
        .config-grid { display: grid; grid-template-columns: 1fr; gap: 5px; }
        input { width: 90%; padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; font-size: 12px; }

        /* MEDIA QUERIES PARA CELULARES */
        @media (max-width: 768px) {
            .sidebar { width: 140px; }
            .btn-sel { font-size: 0.65rem; padding: 6px; }
            #local-time { font-size: 1.4rem; }
            .weather-clock-widget { top: 5px; right: 5px; padding: 5px 10px; }
            .config-grid { grid-template-columns: 1fr; }
            #status { letter-spacing: 2px; }
        }

        .ui-hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body onclick="resetTimer()">

<div id="bg-image"></div>
<div id="dynamic-overlay"></div>

<div class="weather-clock-widget">
    <div id="local-date">---</div>
    <div id="local-time">00:00:00</div>
</div>

<div id="sidebar-ui" class="sidebar">
    <button class="btn-sel active" id="b1" onclick="cambiarActividad(1)">1. ENTREN. 1</button>
    <button class="btn-sel" id="b2" onclick="cambiarActividad(2)">2. ENTREN. 2</button>
    <button class="btn-sel" id="b3" onclick="cambiarActividad(3)">3. CLASIF.</button>
    <button class="btn-sel" id="b4" onclick="cambiarActividad(4)">4. SERIE</button>
    <button class="btn-sel" id="b5" onclick="cambiarActividad(5)">5. FINAL</button>
</div>

<div class="display-main" id="main-content">
    <div id="actividad-nombre">CONFIGURAR</div>
    <div id="status">ESPERANDO</div>
    <div id="timer">00:00:00</div>
    <button id="btn-plus" onclick="sumar5()">+5 MIN</button>
</div>

<div id="config-panel" class="minimized">
    <button class="toggle-panel" onclick="togglePanel()">⚙️ CONFIG</button>
    <div class="config-grid">
        <div style="display:flex; flex-wrap: wrap; gap:5px; justify-content: center;">
            <input type="datetime-local" id="t1">
            <input type="datetime-local" id="t2">
            <input type="datetime-local" id="t3">
            <input type="datetime-local" id="t4">
            <input type="datetime-local" id="t5">
        </div>
        <button onclick="aplicarConfig()" style="width:100%; padding:10px; background:var(--color-verde); border:none; color:white; font-weight:bold; margin-top:5px; border-radius:5px;">ACTUALIZAR TIEMPOS</button>
    </div>
</div>

<script>
    let currentAct = 1;
    let interval;
    let idleTimer;
    let extraMs = 0;

    function updateClock() {
        const ahora = new Date();
        const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        document.getElementById('local-date').innerText = `${dias[ahora.getDay()]} ${ahora.getDate()} ${meses[ahora.getMonth()]}`;
        document.getElementById('local-time').innerText = ahora.toLocaleTimeString('es-ES', { hour12: false });
    }
    setInterval(updateClock, 1000);

    window.onload = () => {
        ['t1','t2','t3','t4','t5'].forEach(id => {
            if(localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
        });
        updateClock(); resetTimer(); aplicarConfig();
    };

    function togglePanel() { document.getElementById('config-panel').classList.toggle('minimized'); }

    function resetTimer() {
        document.getElementById('sidebar-ui').classList.remove('ui-hidden');
        document.getElementById('config-panel').classList.remove('ui-hidden');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if(!document.getElementById('config-panel').matches(':hover')) {
                document.getElementById('sidebar-ui').classList.add('ui-hidden');
                document.getElementById('config-panel').classList.add('ui-hidden');
            }
        }, 8000); 
    }

    function cambiarActividad(num) {
        currentAct = num;
        extraMs = 0;
        const nombres = ["", "ENTRENAMIENTO 1", "ENTRENAMIENTO 2", "CLASIFICACIÓN", "SERIE", "GRAN FINAL"];
        document.getElementById('actividad-nombre').innerText = nombres[num];
        [1,2,3,4,5].forEach(i => document.getElementById('b'+i).classList.toggle('active', i === num));
        aplicarConfig();
    }

    function sumar5() { extraMs += (5 * 60 * 1000); }

    function aplicarConfig() {
        ['t1','t2','t3','t4','t5'].forEach(id => localStorage.setItem(id, document.getElementById(id).value));
        document.getElementById('btn-plus').style.display = (currentAct <= 2) ? "block" : "none";
        const inicioVal = document.getElementById('t' + currentAct).value;
        if (!inicioVal) return;
        const inicio = new Date(inicioVal).getTime();
        if (interval) clearInterval(interval);
        
        interval = setInterval(() => {
            const ahora = new Date().getTime();
            const fin = inicio + (30 * 60 * 1000) + extraMs; 
            const timerEl = document.getElementById('timer');
            const statusEl = document.getElementById('status');
            const overlay = document.getElementById('dynamic-overlay');
            const mainContent = document.getElementById('main-content');
            
            if (ahora < inicio) {
                const diff = inicio - ahora;
                statusEl.innerText = "FALTAN";
                overlay.className = "";
                if (diff > 900000) mainContent.style.color = "white";
                else if (diff > 300000) mainContent.style.color = "var(--color-verde)";
                else mainContent.style.color = "var(--color-rojo)";
                actualizarUI(diff);
            } else if (ahora <= fin) {
                const diff = fin - ahora;
                statusEl.innerText = "EN PISTA";
                if (diff > 300000) {
                    mainContent.style.color = "var(--color-verde)";
                    overlay.className = "overlay-pista";
                } else {
                    mainContent.style.color = "var(--color-rojo)";
                    overlay.className = "overlay-final";
                }
                actualizarUI(diff);
            } else {
                statusEl.innerText = "FINALIZADO";
                timerEl.innerText = "00:00:00"; 
                mainContent.style.color = "white";
                overlay.className = "";
                clearInterval(interval);
            }
        }, 1000);
    }

    function actualizarUI(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
</script>
</body>
</html>
